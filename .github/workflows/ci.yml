name: Continuous Integration

on:
    push:
      branches: [ '*' ]
    pull_request:

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout testes
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Clone API
        run: git clone https://github.com/bellacarmobrito/api-entregas-aula-testes-automatizados.git

      - name: Give permission to mvnw
        run: chmod +x api-entregas-aula-testes-automatizados/mvnw

      - name: Build API JAR
        run: |
          cd api-entregas-aula-testes-automatizados
          ./mvnw clean package -DskipTests

      - name: Start API
        run: |
          cd api-entregas-aula-testes-automatizados
          docker compose up -d --build

      - name: Wait for API
        run: sleep 15

      - name: Run tests
        run: ./mvnw test

